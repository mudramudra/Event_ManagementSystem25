<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<link rel="stylesheet" href="admin.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark bg-maroon">
<div class="container-fluid">
<span class="navbar-brand">Admin Event Management</span>
</div>
</nav>


<div class="container mt-5">

<h3 class="text-center text-maroon mb-4">Registered Students</h3>

<table class="table table-bordered text-center">

<thead class="table-dark">
<tr>
<th>Student Name</th>
<th>Email</th>
<th>Event</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

</div>

<script>

let registrations = JSON.parse(localStorage.getItem("registrations")) || [];

function displayRegistrations(){

let table = document.getElementById("studentTable");

table.innerHTML = "";

registrations.forEach((student,index)=>{

table.innerHTML += `
<tr>
<td>${student.name}</td>
<td>${student.email}</td>
<td>${student.event}</td>

<td>
<button class="btn btn-danger btn-sm" onclick="deleteRegistration(${index})">
Delete
</button>
</td>

</tr>
`;

});

localStorage.setItem("registrations",JSON.stringify(registrations));

}

function deleteRegistration(index){

registrations.splice(index,1);

displayRegistrations();

}

displayRegistrations();

</script>

</body>
</html>
