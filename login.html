<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMCOE Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-container">
  <div class="login-card">

    <img src="motto_mmcoe.png" class="logo">

    <h3 class="title">MMCOE Event Login Portal</h3>

    <form method="POST" action="login.php">

      <div class="form-floating mb-3">
        <input type="email" class="form-control" name="email" placeholder="name@example.com" required>
        <label>Email address</label>
      </div>

      <div class="form-floating mb-3">
        <input type="password" class="form-control" name="password" placeholder="Password" required>
        <label>Password</label>
      </div>

      <div class="mb-3 text-start">
        <label class="fw-bold">Login As</label>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="role" value="admin" id="admin" required>
          <label class="form-check-label">Admin</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="role" value="student" id="student">
          <label class="form-check-label">Student</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="role" value="faculty" id="faculty">
          <label class="form-check-label">Event Organizer (Faculty)</label>
        </div>

      </div>

      <div class="form-check text-start mb-3">
        <input class="form-check-input" type="checkbox" id="remember" name="remember">
        <label class="form-check-label">Remember me</label>
      </div>

      <button type="submit" class="btn btn-maroon w-100">Sign In</button>

      <div class="extra-links mt-3">
        <a href="forgot-password.html">Forgot Password?</a>
        <p>Don't have an account? <a href="#">Sign Up</a></p>
      </div>

    </form>

  </div>
</div>

</body>
</html>
