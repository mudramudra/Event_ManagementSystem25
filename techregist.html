<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Registration - MMCOE</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="techregist.css">

</head>

<body>

<div class="registration-card">

<div class="text-center mb-4">
<h2 class="title">Technical Event Registration</h2>
<p class="text-muted">Register for Technical Event Year 2025-26</p>
</div>

<form action="techregist.php" method="POST">

<div class="row">
<div class="col-md-12 mb-3">
  <label class="form-label fw-bold">Full Name:</label>
  <input type="text" class="form-control" name="full_name" placeholder="Enter your full name" required>
</div>

<div class="col-md-6 mb-3">
  <label class="form-label fw-bold">PRN:</label>
  <input type="text" class="form-control" name="prn" placeholder="e.g. B24CE1067" required>
</div>

<div class="col-md-6 mb-3">
  <label class="form-label fw-bold">Year of Study:</label>
  <select class="form-select" name="year" required>
    <option value="" selected disabled>Select Year</option>
    <option>FE</option>
    <option>SE</option>
    <option>TE</option>
    <option>BE</option>
  </select>
</div>
<div class="col-md-12 mb-3">
  <label class="form-label fw-bold">Department:</label>
  <select class="form-select" name="department" required>
    <option value="" selected disabled>Select Department</option>
    <option>Computer Engineering</option>
    <option>IT Engineering</option>
    <option>E&TC Engineering</option>
    <option>Mechanical Engineering</option>
    <option>Electrical Engineering</option>
  </select>
</div>

<div class="col-md-12 mb-3">
  <label class="form-label fw-bold">Select Event:</label>
  <select class="form-select" name="event" required>
    <option value="" selected disabled>Select Event</option>
    <option>Hackathon</option>
    <option>Project Exhibition</option>
    <option>Coding Competition</option>
    <option>Technical Quiz</option>
    <option>Paper Presentation</option>
    <option>Debugging Challenge</option>
  </select>
</div>
<div class="col-md-12 mb-3">
  <label class="form-label fw-bold">Email Address:</label>
  <input type="email" class="form-control" name="email" placeholder="example@mmcoe.edu.in" required>
</div>


<div class="text-center mt-3">
<button type="submit" class="btn btn-maroon w-100">Register</button>
</div>

<div class="text-center mt-3">
<a href="event.html" class="text-muted small text-decoration-none">← Back to Event Page</a>
</div>

</form>
</div>

</body>
</html>
