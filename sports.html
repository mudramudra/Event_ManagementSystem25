<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cultural Event Registration - MMCOE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="sports.css>
</head>
<body>

    <div class="container registration-card">
        <div class="text-center mb-4">
            <h2 class="title">Sports Event Registration</h2>
            <p class="text-muted">Register for MMCOE Sports Event 2026</p>
        </div>
        
        <form action="event.html" method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Full Name:</label>
                <input type="text" class="form-control" placeholder="Enter your full name" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">PRN:</label>
                    <input type="text" class="form-control" placeholder="e.g. B24CE1067" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Year of Study:</label>
                    <select class="form-select" required>
                        <option value="" selected disabled>Select Year</option>
                        <option>FE</option><option>SE</option><option>TE</option><option>BE</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Department:</label>
                <select class="form-select" id="deptSelect" required>
                    <option value="" selected disabled>Select Department</option>
                    <option value="Comp">Computer Engineering</option>
                    <option value="IT">IT Engineering</option>
                    <option value="ENTC">E&TC Engineering</option>
                    <option value="Mech">Mechanical Engineering</option>
                </select>
            </div>

             <div class="mb-3">
                <label class="form-label fw-bold">Select Event: </label>
                <select class="form-select" id="deptSelect" required>
                    <option value="" selected disabled>Select Event</option>
                    <option value="Comp">Cricket</option>
                    <option value="IT">Badminton</option>
                    <option value="ENTC">Chess</option>
                    <option value="Mech">Tug of war</option>
                    <option vlaue="Comp">Carrom</option>
                    <option value="Mech">Athletics</option>
                </select>
            </div>

            <button type="submit" class="btn btn-maroon w-100">Register</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
