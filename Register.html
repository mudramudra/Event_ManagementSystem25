<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MMCOE Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="login.css">

</head>

<body>

<div class="login-container">
<div class="login-card">

<img src="motto_mmcoe.png" class="logo">
<h3 class="title">MMCOE Event Portal</h3>

<h4 class="title">Create Account</h4>

<form method="POST" action="register.php">

<div class="form-floating mb-3">
<input type="text" class="form-control" name="name" placeholder="Full Name" required>
<label>Full Name</label>
</div>

<div class="form-floating mb-3">
<input type="email" class="form-control" name="email" placeholder="name@mmcoe.edu.in" required>
<label>Email address</label>
</div>

<div class="form-floating mb-3">
<input type="password" class="form-control" name="password" placeholder="Password" required>
<label>Password</label>
</div>

<div class="mb-3 text-start">
<label class="fw-bold">Register As</label>

<div class="form-check">
<input class="form-check-input" type="radio" name="role" value="student" required>
<label class="form-check-label">Student</label>
</div>
<input class="form-check-input" type="radio" name="role" value="admin">
<label class="form-check-label">Admin</label>

<div class="form-check">
<input class="form-check-input" type="radio" name="role" value="faculty">
<label class="form-check-label">Faculty (Event Organizer)</label>
</div>

</div>

<button type="submit" class="btn btn-maroon w-100">Register</button>

<div class="extra-links mt-3">
<p>Already have an account? <a href="login.html">Login</a></p>
</div>

</form>

</div>
</div>

</body>
</html>
